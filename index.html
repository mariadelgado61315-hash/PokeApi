<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>Pokemon API</title>
  </head>
  <body class="bg-slate-900 text-slate-100 min-h-screen font-sans">
    <header class="bg-slate-900 text-center p-8 border-b border-red-500">
      <h1 class="text-5xl font-extrabold text-red-500 uppercase pb-6">
        API Rest Pokedex
      </h1>
      <button
        id="btnCargar"
        class="bg-red-600 hover:bg-red-800 text-white font-bold py-2 px-8 text-lg cursor-pointer transition-colors"
      >
        Iniciar Escaneo
      </button>
    </header>

    <main>
      <div
        id="poke-contenedor"
        class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-10"
      ></div>
    </main>

    <script src="pokeAPI.js"></script>
  </body>
</html>
